<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#b9dfff"/>
      <stop offset=".43" stop-color="#e4a5ff"/>
      <stop offset="1" stop-color="#ff723d"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="2" seed="3"/>
      <feBlend mode="soft-light" in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g filter="url(#blur)" opacity=".85">
    <circle cx="320" cy="210" r="300" fill="#65ffd9"/>
    <circle cx="1180" cy="220" r="340" fill="#714dff"/>
    <circle cx="850" cy="820" r="400" fill="#ffdd32"/>
  </g>
  <path d="M100 820C380 430 590 450 780 700s390 220 720-360" fill="none" stroke="#10100f" stroke-width="90" stroke-opacity=".78"/>
  <path d="M150 850C410 510 590 520 760 730s370 190 690-340" fill="none" stroke="#f6f1e8" stroke-width="7" stroke-opacity=".9"/>
  <text x="1040" y="190" fill="#10100f" font-size="22" font-family="monospace" letter-spacing="9">HIDDEN LAYER</text>
  <rect width="1600" height="1000" filter="url(#grain)" opacity=".16"/>
</svg>
